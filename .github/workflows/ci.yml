name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: |
          git config --global user.email "ci@test"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - run: mise run test

  build-linux:
    name: Build (Linux x86_64 static)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run build-linux
      - uses: actions/upload-artifact@v7
        with:
          name: dotty-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/dotty
          if-no-files-found: error

  build-macos-arm:
    name: Build (macOS aarch64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run build-macos-arm
      - uses: actions/upload-artifact@v7
        with:
          name: dotty-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/dotty
          if-no-files-found: error

  build-windows:
    name: Build (Windows x86_64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run build-windows
      - uses: actions/upload-artifact@v7
        with:
          name: dotty-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/dotty.exe
          if-no-files-found: error
